apiVersion: v1
kind: Secret
metadata:
  name: esustellar-secrets
  namespace: esustellar-staging
  labels:
    app: esustellar-web
    environment: staging
type: Opaque
# Values must be base64-encoded. Replace with actual secrets before applying.
# Example: echo -n 'staging' | base64
stringData:
  NODE_ENV: "staging"
