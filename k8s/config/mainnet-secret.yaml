apiVersion: v1
kind: Secret
metadata:
  name: esustellar-secrets
  namespace: esustellar-mainnet
  labels:
    app: esustellar-web
    environment: mainnet
type: Opaque
# Values must be base64-encoded. Replace with actual secrets before applying.
# Example: echo -n 'production' | base64
stringData:
  NODE_ENV: "production"
