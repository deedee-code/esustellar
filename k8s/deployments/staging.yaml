apiVersion: apps/v1
kind: Deployment
metadata:
  name: esustellar-web
  namespace: esustellar-staging
  labels:
    app: esustellar-web
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: esustellar-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: esustellar-web
    spec:
      containers:
        - name: web
          image: esustellar/web:staging
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: esustellar-config
            - secretRef:
                name: esustellar-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
