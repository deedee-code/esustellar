apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: esustellar-monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
    receivers:
      - name: 'default'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/T00/XXX/YYY'
            channel: '#ops-alerts'
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ .CommonAnnotations.description }}'
      - name: 'critical'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/T00/XXX/YYY'
            channel: '#ops-critical'
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ .CommonAnnotations.description }}'
